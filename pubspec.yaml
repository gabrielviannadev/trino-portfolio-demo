name: trino_portfolio_as_flutter
description: "Portfólio de Materiais da Trino Pagamentos — Flutter Web"
publish_to: 'none'
version: 1.0.0

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  font_awesome_flutter: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/data/
